<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Text Input GUI</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        input[type="text"] { width: 100%; padding: 12px; font-size: 16px; margin: 10px 0; }
        button { padding: 12px 24px; font-size: 16px; }
        #result { margin-top: 20px; padding: 15px; border: 1px solid #ddd; min-height: 60px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h2>Get Session Data</h2>

<button id="getSessionBtn" style="padding: 12px 24px; font-size: 16px; cursor: pointer;">
    Get New Prompt
</button>

<div id="sessionResult" style="margin-top: 20px; padding: 15px; border: 1px solid #ddd; min-height: 60px; background: #f9f9f9; font-family: monospace; white-space: pre-wrap;"></div>
<script>
const sessionBtn = document.getElementById('getSessionBtn');
const sessionResult = document.getElementById('sessionResult');

sessionBtn.addEventListener('click', async () => {
    // Show loading state
    sessionResult.textContent = 'Loading...';
    sessionResult.style.color = '#666';
    
    try {
        const response = await fetch('/acquireprompt', {
            method: 'GET'
        });
        
        if (response.ok) {
            const text = await response.text();  // Plain text response
            sessionResult.textContent = text;
            sessionResult.style.color = '#155724';
        } else {
            sessionResult.textContent = `Error: ${response.status} ${response.statusText}`;
            sessionResult.style.color = '#721c24';
        }
    } catch (err) {
        sessionResult.textContent = `Request failed: ${err.message}`;
        sessionResult.style.color = '#721c24';
    }
});
</script>



    <h1>Enter Text</h1>
    
    <form id="responseForm">
        <input type="text" id="responseInput" name="text" placeholder="Type your text here..." required autofocus>
        <br><br>
        <button type="submit">Submit Text</button>
    </form>

    <div id="responseResult"></div>

    <script>
        const responseForm = document.getElementById('responseForm');
        const responseResultDiv = document.getElementById('responseResult');

        responseForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const text = document.getElementById('responseInput').value.trim();
            if (!text) {
                showResult("Please type something first.", "error");
                return;
            }
            
            // Create a File from the text
            const file = new File([text], "response.txt", { type: "text/plain" });
            
            // Create FormData and append as file
            const formData = new FormData();
            formData.append("file", file);  // ← Key must match backend expectation
            
            try {
                const response = await fetch('/writepromptresponse', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    showResult("Success! Response submitted: " + text, "success");
                } else {
                    const error = await response.text();
                    showResult(`Error: ${error}`, "error");
                }
            } catch (err) {
                showResult(`Request failed: ${err.message}`, "error");
            }
        });

        function showResult(message, type) {
            responseResultDiv.innerHTML = message;
            responseResultDiv.className = type;
        }
    </script>



    <h1>Enter Prompt Type</h1>

<form id="loginForm">
    <input type="text" id="loginInput" name="text" placeholder="Type your text here..." required autofocus>
    <br><br>
    <button type="submit">Submit Text</button>
</form>

<div id="result"></div>

<script>
    const loginForm = document.getElementById('loginForm');
    const loginResultDiv = document.getElementById('result');

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const text = document.getElementById('loginInput').value.trim();
        if (!text) {
            showResult("Please type something first.", "error");
            return;
        }

        // Build URL with query parameter
        const url = `/login?prompttype=${encodeURIComponent(text)}`;

        try {
            const response = await fetch(url, {
                method: 'GET'  // Changed to GET since we're using query parameters
            });

            const data = await response.json();

            if (response.ok) {
                showResult(`Success! Prompt Type: ` + text, "success");
            } else {
                showResult(`Error: ${data.error || 'Unknown error'}`, "error");
            }
        } catch (err) {
            showResult(`Request failed: ${err.message}`, "error");
        }
    });

    function showResult(message, type) {
        loginResultDiv.innerHTML = message;
        loginResultDiv.className = type;
    }
</script>
</body>
</html>
