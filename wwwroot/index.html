<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Text Input GUI</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        input[type="text"] { width: 100%; padding: 12px; font-size: 16px; margin: 10px 0; }
        button { padding: 12px 24px; font-size: 16px; }
        #result { margin-top: 20px; padding: 15px; border: 1px solid #ddd; min-height: 60px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <a href="/.auth/login/google" 
   style="display: inline-block; padding: 12px 24px; background: #4285F4; color: white; text-decoration: none; border-radius: 4px; font-size: 16px;">
    ✅ Verify with Google
</a>

    <h1>Enter Text</h1>
    
    <form id="responseForm">
        <input type="text" id="responseInput" name="text" placeholder="Type your text here..." required autofocus>
        <br><br>
        <button type="submitResponse">Submit Text</button>
    </form>

    <div id="responseResult"></div>

    <script>
        const responseForm = document.getElementById('responseForm');
        const responseResultDiv = document.getElementById('responseResult');

        form.addEventListener('submitResponse', async (e) => {
            e.preventDefault();

            const text = document.getElementById('responseInput').value.trim();
            if (!text) {
                showResult("Please type something first.", "error");
                return;
            }

            const formData = new FormData();
            formData.append("text", text);

            try {
                const response = await fetch('/acquireprompt', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    showResult(`Success! Received: "${data.text}" (${data.length} characters)`, "success");
                } else {
                    showResult(`Error: ${data.error || 'Unknown error'}`, "error");
                }
            } catch (err) {
                showResult(`Request failed: ${err.message}`, "error");
            }
        });

        function showResult(message, type) {
            resultDiv.innerHTML = message;
            resultDiv.className = type;
        }
    </script>



    <h1>Enter Prompt Type</h1>

<form id="loginForm">
    <input type="text" id="loginInput" name="text" placeholder="Type your text here..." required autofocus>
    <br><br>
    <button type="submitLogin">Submit Text</button>
</form>

<div id="result"></div>

<script>
    const loginForm = document.getElementById('loginForm');
    const loginResultDiv = document.getElementById('result');

    form.addEventListener('submitLogin', async (e) => {
        e.preventDefault();

        const text = document.getElementById('loginInput').value.trim();
        if (!text) {
            showResult("Please type something first.", "error");
            return;
        }

        // Build URL with query parameter
        const url = `/login?prompttype=${encodeURIComponent(text)}`;

        try {
            const response = await fetch(url, {
                method: 'GET'  // Changed to GET since we're using query parameters
            });

            const data = await response.json();

            if (response.ok) {
                showResult(`Success! Received: "${data.text}" (${data.length} characters)`, "success");
            } else {
                showResult(`Error: ${data.error || 'Unknown error'}`, "error");
            }
        } catch (err) {
            showResult(`Request failed: ${err.message}`, "error");
        }
    });

    function showResult(message, type) {
        resultDiv.innerHTML = message;
        resultDiv.className = type;
    }
</script>
</body>
</html>
